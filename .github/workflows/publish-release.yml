name: publish-release
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish v0.1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.0 >/dev/null 2>&1; then
            echo "v0.1.0 already exists"; exit 0
          fi
          gh release create v0.1.0 \
            --target main \
            --title "ProtocolGate v0.1.0 — control-plane policy gate (Alpha)" \
            --notes-file .github/RELEASE_v0.1.0.md
